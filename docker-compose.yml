version: '3.8'

services:
  backend-app:
    image: ${DOCKER_USER}/innovatech-backend:latest
    container_name: backend_service
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Conexión interna de Docker a la DB
      - DB_HOST=data_service
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=proyecto_db
    networks:
      - deploy-net

networks:
  deploy-net:
    external: true