name: Deploy Backend
on:
  push:
    branches: [ "deploy" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/innovatech-backend:latest .
          docker push ${{ secrets.DOCKER_USER }}/innovatech-backend:latest
      - name: SSH Deploy (via Bastion)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/app && cd ~/app
            export DOCKER_USER=${{ secrets.DOCKER_USER }}
            export DB_HOST_PRIVATE_IP=${{ secrets.DB_HOST_PRIVATE_IP }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            docker-compose pull
            docker-compose up -d --build